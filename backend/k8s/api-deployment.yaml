apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saas-api
  template:
    metadata:
      labels:
        app: saas-api
    spec:
      containers:
        - name: api
          image: saas-api
          ports:
            - containerPort: 3000